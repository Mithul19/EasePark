name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job

    steps:
      # ✅ Updated checkout version (fix warning)
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      # ✅ Build + Deploy
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_BLACK_RIVER_0EF5AA700 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"

          # ✅ YOUR PROJECT PATH
          app_location: "./ease-park-ai-main"

          # ❗ IMPORTANT: change this if needed
          output_location: "build"   # 👉 use "dist" if Vite

          # ✅ THIS FIXES YOUR ERROR
          app_build_command: "npm install && npm run build"

          api_location: ""

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job

    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_BLACK_RIVER_0EF5AA700 }}
          action: "close"
