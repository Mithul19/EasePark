name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build and Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          # ✅ Your exact secret name (IMPORTANT)
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_BLACK_RIVER_0FE5AA700 }}

          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"

          # ⚠️ MOST IMPORTANT FIX
          app_location: "/"

          # ✅ Vite output
          output_location: "dist"

          # ✅ Build command
          app_build_command: "npm install && npm run build"
